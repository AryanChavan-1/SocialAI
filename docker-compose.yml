version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: socialai-backend
    ports:
      - "8001:8001"
    volumes:
      - db_data:/app/data          # Persistent SQLite volume
    env_file:
      - .env                        # Loads GROQ_API_KEY, REPLICATE_API_TOKEN, etc.
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
      - DATABASE_URL=sqlite:///./data/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001   # Swap with your server IP/domain for prod
    container_name: socialai-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
